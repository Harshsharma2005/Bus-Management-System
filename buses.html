<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="modeToggle">🌙</button>
    <h1>Bus Details</h1>
<table>
    <tr>
        <th>Bus Number</th>
        <th>Route</th>
        <th>Seats Available</th>
    </tr>
    <tr>
        <td>1234</td>
        <td>College - City Center</td>
        <td id="bus-1234-seats">Loading...</td>
    </tr>
</table>

<script>
    const db = getDatabase();
    const busRef = ref(db, 'bookings/1234');
    get(busRef).then(snapshot => {
        let bookedSeats = snapshot.val() ? snapshot.val().seatsBooked : 0;
        document.getElementById('bus-1234-seats').textContent = 20 - bookedSeats;
    });
</script>
</body>
</html>
